name: Python Playwright Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright/python:v1.58.0

    permissions:
      pages: write
      id-token: write
      contents: read

    env:
      TEST_ENV: ${{ vars.TEST_ENV }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node.js, npm, and Java
        run: |
          apt-get update
          apt-get install -y nodejs npm default-jre

      - name: Verify runtime versions
        run: |
          python --version
          python -c "import sys; print(sys.version)"
          pip --version
          node --version
          npm --version
          java --version

      - name: Run tests
        run: |
          pytest \
            --junitxml=pytest-report.xml \
            --html=report.html \
            --self-contained-html \
            --alluredir=allure-results
        continue-on-error: true

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always()
        run: |
          allure generate allure-results -o allure-report --clean

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v4

      - name: Add Allure link to summary
        if: always()
        run: |
          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "Live report:" >> $GITHUB_STEP_SUMMARY
          echo "https://maxpash.github.io/automation_exercise/" >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: test-results/*
          if-no-files-found: ignore

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: pytest-report.xml
          if-no-files-found: ignore

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: report.html
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          if-no-files-found: ignore